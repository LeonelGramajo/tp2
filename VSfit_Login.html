<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" type="text/css" href="Style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--para que la página se adapte a diferentes dispositivos -->
</head>

<body>
<section id="LoginEntero">
        <div class="arriba">
            <img src="img/logo.png" height="200" width="250"> 
        </div> 

    <h1>Visual Studio Fitt</h1>
       <form action="VSfit_Login Loaded.html" method="POST">
    <label for="username">Nombre de usuario:</label>
    <br>    
    <input type="text" id="usuario" name="usuario" placeholder="N/N" required minlength="3" maxlength="12"> 
    <br> <!-- el br es como un endline -->
 
    <label for="password">Contraseña:</label>
        <br>
        <input type="password" id="Contraseña" name="contraseña" placeholder="6-7 caracteres máx" required minlength="3" maxlength="7"> 
        <br>
        <input type="submit" value="Iniciar Sesión">
        <br>
        
    </form>
    <a href="VSfit_Register.html"><button>No tenes cuenta?Registrate para no ser un freddy</button></a>
       </section>
       <script> /*para prevenir que no te registres*/
    document.querySelector('form').addEventListener('submit', function(e) {
        e.preventDefault();

        var usuario = document.getElementById('usuario').value;
        var contrasena = document.getElementById('Contraseña').value;

        // Fija si existe una cuenta guardada
        var usuarioGuardado = localStorage.getItem('usuario');
        var contrasenaGuardada = localStorage.getItem('contrasena');

        if (usuarioGuardado === null) {
            alert('No hay ninguna cuenta registrada. Registrate primero.');
        } else if (usuario === usuarioGuardado && contrasena === contrasenaGuardada) {
            window.location.href = 'VSfit_Login Loaded.html';
        } else {
            alert('Usuario o contraseña incorrectos. Si sigue así, su información sera expuesta a todos los animatrónicos.');
        }
    });
    </script>
       <style>
            body {
              /* Ruta de la imagen */
              background-image: url('https://wallpapers.com/images/hd/muscular-man-doing-strength-training-u0kokyhqhdmh8644.jpg');
              /* Hace que la imagen cubra toda la pantalla */
              background-size: cover;
              /* Centra la imagen */
              background-position: center;
              /* Evita que la imagen se repita */
              background-repeat: no-repeat;
              
              /* Fija la imagen al hacer scroll (opcional) */
              background-attachment: fixed;
            }
          </style>
        </body>  
</html>
