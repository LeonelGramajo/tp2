<!DOCTYPE html>
<html>
<head>
    <title>Registro(fre)</title>
     <link rel="stylesheet" type="text/css" href="Style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--para que la página se adapte a diferentes dispositivos -->
</head>

<body>
    <section id="LoginEntero">
        <div class="arriba">
            <img src="img/logo.png" height="200" width="250"> 
        </div> 

    <h1>Visual Studio Fitt</h1>
    <form action="VSfit_Register Loaded.html" method="POST">
    <label for="username">Nombre de usuario:</label>
    <br>    
    <input type="text" id="usuario" name="usuario" placeholder="N/N" required minlength="3" maxlength="12"> 
    <br> <!-- el br es como un endline -->
    <label for="password">Contraseña:</label>
        <br>
        <input type="password" id="Contraseña" name="contraseña" placeholder="6-7 caracteres máx" required minlength="3" maxlength="7"> 
        <br>
    <label>Nombre:</label>
    <br>
    <input type="text" id="nombre" name="nombre" required>
    <br>
    <label>Apellido:</label>
    <br>
    <input type="text" id="apellido" name="apellido" required>
    <br>
    <label>Edad:</label>
    <br>
    <input type="number" id="edad" name="edad" required min="10" max="100">
    <br>
    <label>Peso (decigramos):</label>
    <br>
    <input type="number" id="peso" name="peso" required>
    <br>
    
    <label>Sexo:</label>
    <br>
    <select name="sexo" id="sexo" required>
    <option value="Macho"> Masculino </option>
    <option value="Mulher"> Femenino </option>
    <option value="Freddy"> Animatrónico </option>
    <option value="Impresora"> HP Color LaserJet Enterprise Flow MFP M880z+ NFC/Wireless Direct Printer </option>
    <option value="Fran"> Jugador de voley </option>
    <option value="Chad"> Mac </option>
</select>
<br>

<label>País:</label>
<br>
<select name="pais" id="pais" required>
    <option value="Argentina">Argensimia</option>
    <option value="Mexico">Mejichango</option>
    <option value="Africa">Burkina Faso</option>
    <option value="Tantan">TanTanCredi</option>
    <option value="pizza">Utah, Huracán</option>
</select>
<br>

<label>Zona horaria:</label>
<br>
<select name="zona_horaria" id="zona_horaria" required>
    <option value="Argenta"> UTC−3 </option>
    <option value="ok"> que tiene que ver la zona horaria</option>
</select>
<br>

<label>Nivel de experiencia:</label>
<br>
<select name="experiencia" id="experiencia" required>
    <option value="noob"> novato </option>
    <option value="normal"> intermedio </option>
     <option value="pro"> avanzado </option>
      <option value="hacker"> hacker </option>
</select>
<br>

<label>Grasa corporal:</label>
<br>
<select name="grasa" id="grasa" required>
    <option value="qsy">no sé</option>
    <option value="six">67%</option>
</select>
<br>

<label>Lesiones:</label>
<br>
<select name="lesiones" id="lesiones" required>
    <option value="hemorroides">hemorroides</option>
    <option value="esguince">esguince de tobillo</option>
    <option value="cuello">cuello girafa</option>    
    <option value="egolift">ego lifter</option>   
    <option value="normal">ninguna de las anteriores</option>       
</select>
<br>

<label>Limitaciones médicas:</label>
<br>
<select name="limitaciones" id="limitaciones" required>
    <option value="cardio">problemas cardíacos</option>
    <option value="presión">presión alta</option> 
    <option value="asma">asma(yako)</option>
    <option value="diabetes">diabetes</option>        
    <option value="hernia">hernia(todas)</option>      
    <option value="sindrome">sindrome del caballo espumoso y dulce de leche infinito</option>     
</select>
<br>

<label>Disponibilidad:</label>
<br>
<select name="disponibilidad" id="disponibilidad" required>
    <option value="todos">Siempre</option>
    <option value="LaV">Lunes a Viernes</option>
    <option value="Findes">Fin de semana</option>
    <option value="fnaf">Solamente el primero de cada mes</option> 
    <option value="Otro">Otro</option>
</select>
<br>

<label>Tipo de sangre:</label>
<br>
<select name="sangre" id="sangre" required>
    <option value="A-">A-</option>
    <option value="A+">A+</option>
    <option value="B-">B-</option>
    <option value="B+">B+</option>
    <option value="O-">O-</option>
    <option value="O+">O+</option>
    <option value="AB-">AB-</option>
    <option value="AB+">AB+</option>
    <option value="NPN">NPN</option>
    <option value="PNP">PNP</option>
    <option value="XOR">XOR</option>
    <option value="DIOCA">AMOG</option>
</select>
<br>
<label>Altura (football field(1 pie= 0.00333333 football field)):</label>
    <br>
    <input type="number" id="altura" name="altura" required>
    <br>
    <label>Correo electrónico(@fazbear.sos):</label>
    <br>
    <input type="email" id="correo" name="correo" required>
    <br>
<!-- Terminos y condiciones, con checkbox lo hicimos(SOS)-->
<input type="checkbox" id="terminos" name="terminos" required>
<label for="terminos">Acepta los términos y condiciones de freddy fazbear's pizza incorporated by Onix?</label>
<br>
<input type="submit" value="Registrarse">
        <br>
    </form>
    </section>
    <script> /*este javascript es para que no te permita poner "iniciar sesión sin antes haberte registrado"*/
    document.querySelector('form').addEventListener('submit', function(e) {
        e.preventDefault(); // evita que el formulario se envíe solo
        // Agarra todos los valores
        var usuario = document.getElementById('usuario').value;
        var contrasena = document.getElementById('Contraseña').value;
        // Guarda el usuario en localStorage
        localStorage.setItem('usuario', usuario);
        localStorage.setItem('contrasena', contrasena);
        // Redirige a la página de carga
        window.location.href = 'VSfit_Register Loaded.html';
    });
</script>
       <style>
            body {
              /* Ruta de la imagen */
              background-image: url('https://wallpapercave.com/wp/wp8235182.jpg');
              /* Hace que la imagen cubra toda la pantalla */
              background-size: cover;
              /* Centra la imagen */
              background-position: center;
              /* Evita que la imagen se repita */
              background-repeat: no-repeat;
              
              /* Fija la imagen al hacer scroll (opcional) */
              background-attachment: fixed;
            }
          </style>
        </body>
